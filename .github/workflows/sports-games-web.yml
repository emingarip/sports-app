name: Sports Games Web CI

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
      - 'bugfix/**'
      - 'fix/**'
    paths:
      - 'sports_games_web/**'
  pull_request:
    paths:
      - 'sports_games_web/**'
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sports_games_web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type Check & Build
        run: npm run build

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "sports_games_web/dist/*"
          target: "/var/www/sportsapp-games"
          strip_components: 2

      - name: Deploy and Configure HTTPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Starting deployment to VPS for games.boskale.com..."
            
            mkdir -p /var/www/sportsapp-games
            chown -R www-data:www-data /var/www/sportsapp-games
            
            if [ ! -f /etc/nginx/sites-available/sportsgames ]; then
                echo "Creating initial Nginx configuration..."
                cat << 'EOF' > /etc/nginx/sites-available/sportsgames
            server {
                listen 80;
                server_name games.boskale.com;
                root /var/www/sportsapp-games;
                index index.html index.htm;
                
                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            EOF
                
                ln -sf /etc/nginx/sites-available/sportsgames /etc/nginx/sites-enabled/
                nginx -t && systemctl reload nginx
            fi
            
            echo "Checking SSL..."
            if ! grep -q "ssl_certificate" /etc/nginx/sites-available/sportsgames; then
                echo "Running Certbot..."
                apt-get update && apt-get install -y certbot python3-certbot-nginx
                certbot --nginx -d games.boskale.com --non-interactive --agree-tos -m admin@boskale.com --redirect
            fi
            
            systemctl reload nginx
            echo "Deployment successful."
