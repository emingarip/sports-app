name: Deploy Flutter Web to VPS

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
      - 'bugfix/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      - name: Build Web
        run: flutter build web --wasm --base-href "/" --release

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "build/web/*"
          target: "/var/www/sportsapp-web"
          strip_components: 2

      - name: Deploy and Configure HTTPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Starting deployment to VPS..."
            
            mkdir -p /var/www/sportsapp-web
            chown -R www-data:www-data /var/www/sportsapp-web
            
            if [ ! -f /etc/nginx/sites-available/sportsapp ]; then
                echo "Creating initial Nginx configuration..."
                cat << 'EOF' > /etc/nginx/sites-available/sportsapp
            server {
                listen 80;
                server_name www.boskale.com boskale.com;
                root /var/www/sportsapp-web;
                index index.html index.htm;
                
                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            EOF
                
                ln -sf /etc/nginx/sites-available/sportsapp /etc/nginx/sites-enabled/
                nginx -t && systemctl reload nginx
            fi
            
            echo "Checking SSL..."
            if ! grep -q "ssl_certificate" /etc/nginx/sites-available/sportsapp; then
                echo "Running Certbot..."
                apt-get update && apt-get install -y certbot python3-certbot-nginx
                certbot --nginx -d www.boskale.com -d boskale.com --non-interactive --agree-tos -m admin@boskale.com --redirect
            fi
            
            systemctl reload nginx
            echo "Deployment successful."
